<!DOCTYPE html>
<html lang="es" class="h-full bg-gray-50">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar sesión — Metabridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center p-4">

<div class="w-full max-w-md">
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-12 h-12 bg-indigo-600 rounded-xl mb-4">
            <span class="text-white font-bold text-xl">M</span>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">Metabridge</h1>
        <p class="text-gray-500 text-sm mt-1">WhatsApp &amp; Messenger API para tu negocio</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
        <h2 class="text-lg font-semibold text-gray-900 mb-6">Iniciar sesión</h2>

        {% if errors %}
        <div class="mb-4 px-4 py-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
            {% for key, msg in errors.items() %}{{ msg }}{% endfor %}
        </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" value="{{ old.get('email', '') }}" required autofocus
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
            </div>

            <div class="flex items-center">
                <input type="checkbox" name="remember" id="remember" class="rounded text-indigo-600">
                <label for="remember" class="ml-2 text-sm text-gray-600">Recordarme</label>
            </div>

            <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg text-sm transition-colors">
                Entrar
            </button>
        </form>
    </div>

    <p class="text-center text-sm text-gray-500 mt-6">
        ¿No tienes cuenta?
        <a href="/register" class="text-indigo-600 hover:underline font-medium">Crear cuenta gratis</a>
    </p>
</div>

</body>
</html>
